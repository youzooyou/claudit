# ─────────────────────────────────────────────────────────────
# Claudit 샘플 회귀 테스트 — TodoMVC (React)
# ─────────────────────────────────────────────────────────────
#
# 이 파일은 Claudit에서 실제로 동작하는 `.test.yaml` 샘플입니다.
# 처음 사용하는 분이 "내 환경에서 곧바로 돌려볼 수 있는 테스트"를 갖도록
# 누구나 접근 가능한 공개 데모 사이트(TodoMVC)를 대상으로 작성되었습니다.
#
# ──[ 체험 방법 ]──────────────────────────────────────────────
#   1. 브라우저를 열고 https://todomvc.com/examples/react/dist/ 로 이동
#   2. Claudit 사이드바에서 `/ai-test` 입력 → Mode 1 (회귀 테스트) 선택
#   3. 에이전트가 URL pattern(`/examples/react/dist`)을 감지 →
#      이 파일을 자동으로 로드해서 T-01부터 순차 실행합니다.
#   4. 실행 후 사이드바에 e2e-results 리포트가 나타나면 성공.
#
# ──[ 새 테스트 만들 때 참고 ]────────────────────────────────
#   - 이 파일을 복사해서 `{화면-id}.test.yaml`로 저장하세요.
#   - 파일명 규칙:
#       * `{화면-id}.test.yaml` — URL 마지막 세그먼트로 1차 매칭
#       * 그 외 파일명 — 아래 `url_pattern` 필드로 2차 매칭
#       * `_`로 시작하는 파일 — 자동 매칭 제외 (수동 호출만 가능)
#   - 스키마 정의: `data/regression/_schema.yaml`
#   - 도구 상세:  `.claude/rules/tools-patterns.md`

# ── 메타 ─────────────────────────────────────────────────────
screen: TodoMVC React Demo          # 사람이 읽는 화면명 (리포트에 표시됨)
screen_id: sample-todomvc           # 스펙 파일과 연결되는 고유 ID
url_pattern: /examples/react/dist   # URL pathname 부분 매칭 (2차 매칭 키)
mode: regression                    # 항상 "regression" 고정
generated: 2026-04-11               # 생성 날짜 (참고용)

# ── 테스트 스텝 ──────────────────────────────────────────────
# 각 스텝은 `tools` 리스트를 순서대로 호출하고 `expect`로 검증합니다.
# 에이전트는 expect를 "이 시점에 이 상태여야 한다"는 힌트로 읽습니다.
steps:

  # ────────────────────────────────────────────
  # T-01 — 페이지 초기 상태 파악
  # ────────────────────────────────────────────
  # inspect_page: 페이지의 버튼/입력/그리드/필터를 한 번에 수집합니다.
  # 새 페이지에서 "무엇이 있는지" 모를 때 항상 첫 번째로 호출하세요.
  - id: T-01
    desc: TodoMVC 페이지 로딩 + 입력 필드 존재 확인
    tags: [smoke, grid]
    tools:
      - inspect_page          # 페이지 구조 스냅샷
      - browser_capture       # 스크린샷 (리포트에 첨부)
    expect:
      rows_empty: true        # 초기에는 할 일 목록이 비어 있음

  # ────────────────────────────────────────────
  # T-02 — 새 할 일 추가
  # ────────────────────────────────────────────
  # TodoMVC는 `input.new-todo`에 텍스트 입력 후 Enter 키로 커밋합니다.
  # browser_type → browser_keyboard 조합이 React SPA에서 가장 안정적입니다.
  # (browser_type 단독으로는 Enter가 발생하지 않으니 주의)
  - id: T-02
    desc: 새 할 일 "Claudit 체험하기" 입력 + Enter로 저장
    tags: [create]
    tools:
      - browser_type:
          selector: 'input.new-todo'
          text: 'Claudit 체험하기'
      - browser_keyboard:
          selector: 'input.new-todo'
          key: 'Enter'
    expect:
      rows_visible: true      # 목록에 최소 1개 이상

  # ────────────────────────────────────────────
  # T-03 — 목록 개수 검증
  # ────────────────────────────────────────────
  # browser_get_all: 같은 CSS 선택자로 매칭되는 요소를 모두 반환.
  # AgGrid가 아닌 일반 HTML 리스트의 행 수를 확인할 때 사용합니다.
  - id: T-03
    desc: 할 일 목록에 새로 추가된 항목이 보이는지 확인
    tags: [list]
    tools:
      - browser_get_all:
          selector: 'ul.todo-list li'
    expect:
      rows_visible: true

  # ────────────────────────────────────────────
  # T-04 — 체크박스로 완료 처리
  # ────────────────────────────────────────────
  # TodoMVC 표준 동작: 체크박스 클릭 시 <li>에 `completed` 클래스가 붙습니다.
  # 동일 selector로 완료된 항목만 다시 조회해서 상태 변경을 검증합니다.
  - id: T-04
    desc: 첫 번째 할 일 체크박스 클릭 → 완료 상태 전환 확인
    tags: [update]
    tools:
      - browser_click:
          selector: 'ul.todo-list li input.toggle'
          nth: 0                                    # 첫 번째 항목
      - browser_get_all:
          selector: 'ul.todo-list li.completed'
    expect:
      rows_visible: true      # `.completed` 클래스가 붙은 li가 1개 이상

  # ────────────────────────────────────────────
  # T-05 — 최종 상태 스크린샷
  # ────────────────────────────────────────────
  # 리포트 끝에 최종 화면을 첨부해 "테스트 완료 시점의 UI 상태"를 기록합니다.
  # 회귀 테스트에서는 마지막 T-NN에 항상 browser_capture를 넣는 것을 권장합니다.
  - id: T-05
    desc: 최종 화면 캡처 (리포트 첨부용)
    tags: [smoke]
    tools:
      - browser_capture
    expect:
      rows_visible: true
